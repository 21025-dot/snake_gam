<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>64x64 貪食蛇</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <div class="hud">
        <div>時間：<span id="timeText">00:00</span></div>
        <div>食物數：<span id="scoreText">0</span></div>
        <div class="hint">使用 `WASD` 或方向鍵控制</div>
      </div>

      <div class="boardWrap">
        <canvas id="gameCanvas" width="512" height="512" aria-label="貪食蛇遊戲畫面"></canvas>
        <div id="overlay" class="overlay" role="dialog" aria-live="polite">
          <div class="overlayCard">
            <div class="overlayTitle" id="overlayTitle">遊戲結束</div>
            <div class="overlayLine" id="overlayTime">時間：00:00</div>
            <div class="overlayLine" id="overlayScore">成功吃到的食物數量：0</div>
            <button id="restartBtn" type="button">重新開始</button>
            <div class="overlaySub">提示：遊戲結束後可點「重新開始」</div>
          </div>
        </div>
      </div>
    </main>

    <script src="./game.js" defer></script>
  </body>
</html>
